<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Uniéndose a sesión...</title>
    <script>
        const path = window.location.pathname;
        const parts = path.split('/');
        const sessionId = parts[parts.length - 1];
        
        if (sessionId && path.includes('/session/')) {
            // Intenta abrir la app Android
            window.location.href = 'intent://' + window.location.host + path + '#Intent;scheme=https;package=com.example.mylocationplannerapp;action=android.intent.action.VIEW;end';
            
            // Si no abre en 2 segundos, muestra mensaje
            setTimeout(() => {
                document.getElementById('msg').style.display = 'block';
            }, 2000);
        }
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">
    <h2>Planificador de Salida</h2>
    <p>Abriendo la app...</p>
    <div id="msg" style="display:none">
        <p>Si la app no abre automáticamente, copia este código en la app:</p>
        <h3 id="code"></h3>
        <script>
            const p = window.location.pathname.split('/');
            document.getElementById('code').textContent = p[p.length-1];
        </script>
    </div>
</body>
</html>
